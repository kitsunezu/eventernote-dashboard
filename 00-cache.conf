# HTTP-level config: proxy cache zone + JSON access log format.
# Loaded inside the http{} block before default.conf (alphabetical order).
proxy_cache_path /var/cache/nginx/eventernote
                 levels=1:2
                 keys_zone=eventernote_cache:10m
                 max_size=50m
                 inactive=12h
                 use_temp_path=off;

# JSON access log format for SigNoz log ingestion
log_format json_access escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'        # real visitor IP after CF-Connecting-IP processing
      '"cf_ray":"$http_cf_ray",'             # Cloudflare Ray-ID for request correlation
      '"cf_country":"$http_cf_ipcountry",'  # Cloudflare GeoIP country code
      '"method":"$request_method",'
      '"request_uri":"$request_uri",'
      '"status":$status,'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"upstream_response_time":"$upstream_response_time",'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"upstream_cache_status":"$upstream_cache_status"'
    '}';
