# HTTP-level proxy cache zone for eventernote upstream.
# Included inside the http{} block by nginx:alpine's default nginx.conf.
# Must be alphabetically before default.conf so the zone is defined first.
proxy_cache_path /var/cache/nginx/eventernote
                 levels=1:2
                 keys_zone=eventernote_cache:10m
                 max_size=50m
                 inactive=30m
                 use_temp_path=off;
