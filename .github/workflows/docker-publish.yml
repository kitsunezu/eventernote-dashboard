name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Portainer redeploy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_BASE_URL: https://portainer.kitsunet.app
          PORTAINER_STACK_ID: "42"
          PORTAINER_ENDPOINT_ID: "3"
        run: |
          if [ -z "$PORTAINER_API_KEY" ]; then
            echo "::error::PORTAINER_API_KEY secret is not configured"
            exit 1
          fi
          if [ -z "$CF_ACCESS_CLIENT_ID" ] || [ -z "$CF_ACCESS_CLIENT_SECRET" ]; then
            echo "::error::Cloudflare Access service token secrets are not configured"
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            --request PUT \
            --header "CF-Access-Client-ID: $CF_ACCESS_CLIENT_ID" \
            --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            --header "X-API-Key: $PORTAINER_API_KEY" \
            --header "Content-Type: application/json" \
            --data '{"RepullImageAndRedeploy":true}' \
            "$PORTAINER_BASE_URL/api/stacks/$PORTAINER_STACK_ID/git/redeploy?endpointId=$PORTAINER_ENDPOINT_ID"
