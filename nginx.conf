server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Cloudflare real IP restore ────────────────────────────────
    # Replace $remote_addr with the real visitor IP from CF-Connecting-IP.
    # Docker bridge/overlay networks — nginx sees the host gateway (172.x) as
    # $remote_addr due to Docker NAT; trust these so the CF header is applied.
    set_real_ip_from   172.16.0.0/12;
    set_real_ip_from   10.0.0.0/8;
    set_real_ip_from   192.168.0.0/16;
    # Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4)
    set_real_ip_from   103.21.244.0/22;
    set_real_ip_from   103.22.200.0/22;
    set_real_ip_from   103.31.4.0/22;
    set_real_ip_from   104.16.0.0/13;
    set_real_ip_from   104.24.0.0/14;
    set_real_ip_from   108.162.192.0/18;
    set_real_ip_from   131.0.72.0/22;
    set_real_ip_from   141.101.64.0/18;
    set_real_ip_from   162.158.0.0/15;
    set_real_ip_from   172.64.0.0/13;
    set_real_ip_from   173.245.48.0/20;
    set_real_ip_from   188.114.96.0/20;
    set_real_ip_from   190.93.240.0/20;
    set_real_ip_from   197.234.240.0/22;
    set_real_ip_from   198.41.128.0/17;
    # Cloudflare IPv6 ranges (https://www.cloudflare.com/ips-v6)
    set_real_ip_from   2400:cb00::/32;
    set_real_ip_from   2606:4700::/32;
    set_real_ip_from   2803:f800::/32;
    set_real_ip_from   2405:b500::/32;
    set_real_ip_from   2405:8100::/32;
    set_real_ip_from   2a06:98c0::/29;
    set_real_ip_from   2c0f:f248::/32;
    real_ip_header     CF-Connecting-IP;
    real_ip_recursive  on;

    # Docker embedded DNS + public DNS fallback
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=30s;
    resolver_timeout 5s;

    # log_format is defined in 00-cache.conf (http context)
    access_log /dev/stdout json_access;
    error_log  /dev/stderr warn;

    # ── Reverse proxy: /api/eventernote → eventernote.com ────────
    location /api/eventernote/ {
        proxy_pass          __EVENTERNOTE_UPSTREAM__/;
        proxy_ssl_server_name on;
        proxy_ssl_name      __EVENTERNOTE_HOST__;
        proxy_http_version  1.1;
        proxy_set_header    Connection              "";

        # Realistic browser headers to avoid 403/429 bot detection
        proxy_set_header    Host                    "__EVENTERNOTE_HOST__";
        proxy_set_header    User-Agent              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
        proxy_set_header    Accept                  "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8";
        proxy_set_header    Accept-Language         "ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7";
        proxy_set_header    Accept-Encoding         "gzip, deflate, br";
        proxy_set_header    Referer                 "https://www.eventernote.com/";
        proxy_set_header    Upgrade-Insecure-Requests "1";

        # Keep upstream requests stateless and omit client-derived proxy headers.
        proxy_set_header    Cookie                  "";

        # Serve stale cache when Eventernote throttles or forbids our egress IP.
        proxy_cache             eventernote_cache;
        proxy_cache_valid       200 30m;
        proxy_cache_valid       301 302 1m;
        proxy_cache_use_stale   error timeout updating http_403 http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 10s;
        add_header              X-Cache-Status $upstream_cache_status always;
        # Expose real visitor IP to browser OTel span attributes
        add_header              X-Client-IP $remote_addr always;
    }

    # ── OTLP proxy → SigNoz collector ────────────────────────────
    # Set OTEL_BACKEND env var at container start (e.g. http://signoz:4318)
    location /api/otel/ {
        proxy_pass          __OTEL_BACKEND__/;
        proxy_set_header    Host $http_host;
    }

    # ── Admin sub-path: serve admin/index.html ───────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        # Expose client IP to the browser for OTel span attributes
        add_header X-Client-IP $remote_addr always;
        try_files $uri $uri/ /index.html;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
