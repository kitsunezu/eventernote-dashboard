server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS + public DNS fallback
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=30s;
    resolver_timeout 5s;

    # ── Access log in JSON for SigNoz log ingestion ───────────────
    log_format json_access escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$uri",'
          '"status":$status,'
          '"bytes_sent":$bytes_sent,'
          '"request_time":$request_time,'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"upstream_cache_status":"$upstream_cache_status"'
        '}';
    access_log /dev/stdout json_access;
    error_log  /dev/stderr warn;

    # ── Reverse proxy: /api/eventernote → eventernote.com ────────
    location /api/eventernote/ {
        proxy_pass          https://www.eventernote.com/;
        proxy_ssl_server_name on;

        # Realistic browser headers to avoid 403/429 bot detection
        proxy_set_header    Host                    "www.eventernote.com";
        proxy_set_header    User-Agent              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
        proxy_set_header    Accept                  "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8";
        proxy_set_header    Accept-Language         "ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7";
        proxy_set_header    Accept-Encoding         "gzip, deflate, br";
        proxy_set_header    Referer                 "https://www.eventernote.com/";
        proxy_set_header    Upgrade-Insecure-Requests "1";

        # Do NOT leak proxy/client info to upstream
        proxy_set_header    X-Real-IP               "";
        proxy_set_header    X-Forwarded-For         "";
        proxy_set_header    X-Forwarded-Proto       "";
        proxy_set_header    Cookie                  "";

        # Serve stale cache on 429 / errors to reduce upstream request rate
        proxy_cache             eventernote_cache;
        proxy_cache_valid       200 15m;
        proxy_cache_valid       301 302 1m;
        proxy_cache_use_stale   error timeout updating http_429 http_500 http_502 http_503;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 10s;
        add_header              X-Cache-Status $upstream_cache_status;
    }

    # ── OTLP proxy → SigNoz collector ────────────────────────────
    # Set OTEL_BACKEND env var at container start (e.g. http://signoz:4318)
    location /api/otel/ {
        proxy_pass          __OTEL_BACKEND__/;
        proxy_set_header    Host $http_host;
    }

    # ── Admin sub-path: serve admin/index.html ───────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        # Expose client IP to the browser for OTel span attributes
        add_header X-Client-IP $remote_addr always;
        try_files $uri $uri/ /index.html;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
