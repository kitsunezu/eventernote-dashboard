server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve DNS for upstream proxy (required for HTTPS proxy_pass with variable)
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Reverse proxy: /api/eventernote → eventernote.com ────────
    location /api/eventernote/ {
        proxy_pass          https://www.eventernote.com/;
        proxy_set_header    Host                www.eventernote.com;
        proxy_set_header    User-Agent          "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        proxy_set_header    Accept-Language     "ja,en;q=0.9";
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_ssl_server_name on;

        # Strip any cookies before forwarding (privacy / avoid session leaks)
        proxy_set_header    Cookie              "";
    }

    # ── Admin sub-path: serve admin/index.html ───────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
