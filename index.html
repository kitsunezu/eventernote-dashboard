<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Eventernote Dashboard — イベンターノートの参加イベントをタイムライン・日程一覧で管理できる個人スケジュールビューアです。" />
    <meta name="keywords" content="Eventernote, イベンターノート, イベント, スケジュール, タイムライン, ダッシュボード" />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eventernote Dashboard" />
    <meta property="og:description" content="イベンターノートの参加イベントをタイムライン・日程一覧で管理できる個人スケジュールビューアです。" />
    <meta name="theme-color" content="#11161f" />
    <title>Eventernote Dashboard</title>
    <style>
      /* Initial loading screen — shown before React mounts, hidden once #root has content */
      #root:empty::after {
        content: '';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #11161f;
        z-index: 9999;
      }
      #root:empty::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 32px;
        height: 32px;
        border: 2.5px solid #2a3040;
        border-top-color: #5b7bc4;
        border-radius: 50%;
        animation: _init-spin 0.8s linear infinite;
        z-index: 10000;
      }
      @keyframes _init-spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
